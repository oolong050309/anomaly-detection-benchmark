<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 432" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Helvetica, Arial, sans-serif">
  <style>
    .ttl  { font-size:13.5px; font-weight:700; fill:#1e293b; }
    .ax   { font-size:11px; fill:#475569; }
    .nm   { font-size:11.5px; font-weight:600; fill:#334155; }
    .val  { font-size:12px; font-weight:700; }
    .reg  { font-size:12.5px; font-weight:700; }
    .sub  { font-size:10px; fill:#64748b; }
    .mech { font-size:11px; fill:#334155; }
  </style>

  <text x="360" y="26" text-anchor="middle" class="ttl">主动剪裁（IQR_Trim）对下游模型的净收益与失效边界（20% 污染）</text>

  <!-- region tints -->
  <rect x="64" y="84" width="600" height="126" fill="#ecfdf5"/>
  <rect x="64" y="210" width="600" height="78" fill="#fef2f2"/>

  <!-- y axis label -->
  <text x="26" y="190" transform="rotate(-90,26,190)" text-anchor="middle" class="ax">AUC-ROC 变化 (pp)</text>
  <!-- gridlines -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="64" y1="84" x2="664" y2="84"/>
    <line x1="64" y1="146" x2="664" y2="146"/>
    <line x1="64" y1="272" x2="664" y2="272"/>
  </g>
  <g class="ax" fill="#94a3b8">
    <text x="58" y="88" text-anchor="end">+2.8</text>
    <text x="58" y="150" text-anchor="end">+1.4</text>
    <text x="58" y="276" text-anchor="end">−1.4</text>
  </g>

  <!-- zero axis -->
  <line x1="64" y1="210" x2="664" y2="210" stroke="#334155" stroke-width="1.6"/>
  <text x="58" y="214" text-anchor="end" class="ax" font-weight="700">0</text>

  <!-- bars: zero at y=210, 1pp = 46px -->
  <!-- MLP +2.52 -->
  <rect x="83"  y="94"  width="54" height="116" rx="3" fill="#059669"/>
  <text x="110" y="88"  text-anchor="middle" class="val" fill="#047857">+2.52</text>
  <!-- XGBoost +1.26 -->
  <rect x="153" y="152" width="54" height="58"  rx="3" fill="#059669"/>
  <text x="180" y="146" text-anchor="middle" class="val" fill="#047857">+1.26</text>
  <!-- LightGBM +0.95 -->
  <rect x="223" y="166" width="54" height="44"  rx="3" fill="#10b981"/>
  <text x="250" y="160" text-anchor="middle" class="val" fill="#047857">+0.95</text>
  <!-- RF +0.61 -->
  <rect x="293" y="182" width="54" height="28"  rx="3" fill="#10b981"/>
  <text x="320" y="176" text-anchor="middle" class="val" fill="#047857">+0.61</text>

  <!-- separator -->
  <line x1="378" y1="92" x2="378" y2="300" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="4,3"/>

  <!-- TabPFN -0.75 -->
  <rect x="419" y="210" width="54" height="34" rx="3" fill="#dc2626"/>
  <text x="446" y="260" text-anchor="middle" class="val" fill="#b91c1c">−0.75</text>
  <!-- LR -1.21 -->
  <rect x="489" y="210" width="54" height="56" rx="3" fill="#dc2626"/>
  <text x="516" y="282" text-anchor="middle" class="val" fill="#b91c1c">−1.21</text>

  <!-- model names -->
  <g class="nm" text-anchor="middle">
    <text x="110" y="320">MLP</text>
    <text x="180" y="320">XGBoost</text>
    <text x="250" y="320">LightGBM</text>
    <text x="320" y="320">RF</text>
    <text x="446" y="320">TabPFN</text>
    <text x="516" y="320">LR</text>
  </g>

  <!-- region labels -->
  <text x="600" y="108" text-anchor="end" class="reg" fill="#047857">受益区</text>
  <text x="600" y="124" text-anchor="end" class="sub" fill="#059669">高容量监督模型：剔除噪声→边界更纯净</text>
  <text x="392" y="232" class="reg" fill="#b91c1c">失效区（No Free Lunch）</text>

  <!-- mechanism notes -->
  <line x1="64" y1="344" x2="664" y2="344" stroke="#e2e8f0" stroke-width="1"/>
  <text x="64" y="366" class="mech" font-weight="700">失效机理：</text>
  <text x="64" y="388" class="mech">· LR（线性）——剪裁误删紧贴决策边界的支撑样本，线性超平面发生漂移。</text>
  <text x="64" y="408" class="mech">· TabPFN（上下文学习）——剪裁破坏训练集局部密度，扰乱注意力后验推断。</text>
</svg>
