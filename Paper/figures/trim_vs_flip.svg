<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="tf-ar" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .ttl  { font-size:12.5px; font-weight:700; fill:#ffffff; }
    .cap  { font-size:10.5px; fill:#475569; }
    .lg   { font-size:11px; fill:#334155; }
    .note { font-size:10px; font-weight:600; }
    .bd   { fill:none; stroke:#334155; stroke-width:2.1; }
    .plot { fill:#f8fafc; stroke:#e2e8f0; stroke-width:1; }
    .block-title { font-size:14px; font-weight:800; }
  </style>

  <!-- ===== legend ===== -->
  <g class="lg">
    <circle cx="302" cy="18" r="5.5" fill="#2563eb"/><text x="314" y="22">标注正常</text>
    <polygon points="405,13 399,25 411,25" fill="#dc2626"/><text x="417" y="22">标注异常</text>
    <circle cx="506" cy="18" r="7.5" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="3,2"/><text x="518" y="22">可疑样本</text>
    <text x="620" y="22" fill="#94a3b8">✕ 已剔除</text>
    <line x1="710" y1="18" x2="736" y2="18" class="bd"/><text x="742" y="22">决策边界</text>
  </g>

  <!-- ===================== Trim subfigure ===================== -->
  <text x="280" y="54" text-anchor="middle" class="block-title" fill="#0e7490">Trim：删除可疑样本</text>

  <g transform="translate(30,70)">
    <rect class="plot" x="0" y="0" width="230" height="260" rx="8"/>
    <rect x="0" y="0" width="230" height="26" rx="8" fill="#334155"/>
    <text x="115" y="18" text-anchor="middle" class="ttl">含噪训练集</text>
    <path class="bd" d="M135,47 C 190,78 188,114 145,138 C 110,158 72,194 76,224 L 80,248"/>
    <g fill="#2563eb">
      <circle cx="52" cy="205" r="5.5"/><circle cx="70" cy="180" r="5.5"/><circle cx="96" cy="214" r="5.5"/>
      <circle cx="62" cy="238" r="5.5"/><circle cx="104" cy="196" r="5.5"/><circle cx="84" cy="168" r="5.5"/><circle cx="132" cy="230" r="5.5"/>
    </g>
    <g fill="#dc2626">
      <polygon points="157,89 151,101 163,101"/><polygon points="185,112 179,124 191,124"/>
      <polygon points="170,66 164,78 176,78"/><polygon points="204,92 198,104 210,104"/><polygon points="148,132 142,144 154,144"/>
    </g>
    <circle cx="141" cy="166" r="5.5" fill="#2563eb"/>
    <polygon points="82,204 76,216 88,216" fill="#dc2626"/>
    <circle cx="82" cy="210" r="10" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="3,2"/>
    <circle cx="178" cy="99" r="5.5" fill="#2563eb"/>
    <circle cx="178" cy="99" r="10" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="3,2"/>
  </g>

  <line x1="272" y1="200" x2="302" y2="200" stroke="#475569" stroke-width="2.1" marker-end="url(#tf-ar)"/>
  <text x="287" y="189" text-anchor="middle" class="cap" fill="#0e7490">Trim</text>

  <g transform="translate(310,70)">
    <rect class="plot" x="0" y="0" width="230" height="260" rx="8"/>
    <rect x="0" y="0" width="230" height="26" rx="8" fill="#0e7490"/>
    <text x="115" y="18" text-anchor="middle" class="ttl">剪裁后训练集</text>
    <line class="bd" x1="129" y1="47" x2="129" y2="248"/>
    <g fill="#2563eb">
      <circle cx="52" cy="205" r="5.5"/><circle cx="70" cy="180" r="5.5"/><circle cx="96" cy="214" r="5.5"/>
      <circle cx="62" cy="238" r="5.5"/><circle cx="104" cy="196" r="5.5"/><circle cx="84" cy="168" r="5.5"/><circle cx="132" cy="230" r="5.5"/>
    </g>
    <g fill="#dc2626">
      <polygon points="157,89 151,101 163,101"/><polygon points="185,112 179,124 191,124"/>
      <polygon points="170,66 164,78 176,78"/><polygon points="204,92 198,104 210,104"/><polygon points="148,132 142,144 154,144"/>
    </g>
    <circle cx="141" cy="166" r="5.5" fill="#2563eb"/>
    <text x="82" y="214" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">✕</text>
    <circle cx="82" cy="210" r="10" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="178" y="103" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">✕</text>
    <circle cx="178" cy="99" r="10" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="206" y="58" text-anchor="middle" class="note" fill="#0e7490">✓</text>
  </g>
  <text x="280" y="356" text-anchor="middle" class="cap">剔除标签与特征相悖的可疑样本，边界恢复洁净</text>

  <!-- ===================== Flip subfigure ===================== -->
  <text x="800" y="54" text-anchor="middle" class="block-title" fill="#b45309">Flip：翻转可疑标签</text>

  <g transform="translate(570,70)">
    <rect class="plot" x="0" y="0" width="230" height="260" rx="8"/>
    <rect x="0" y="0" width="230" height="26" rx="8" fill="#334155"/>
    <text x="115" y="18" text-anchor="middle" class="ttl">含噪训练集</text>
    <path class="bd" d="M135,47 C 190,78 188,114 145,138 C 110,158 72,194 76,224 L 80,248"/>
    <g fill="#2563eb">
      <circle cx="52" cy="205" r="5.5"/><circle cx="70" cy="180" r="5.5"/><circle cx="96" cy="214" r="5.5"/>
      <circle cx="62" cy="238" r="5.5"/><circle cx="104" cy="196" r="5.5"/><circle cx="84" cy="168" r="5.5"/><circle cx="132" cy="230" r="5.5"/>
    </g>
    <g fill="#dc2626">
      <polygon points="157,89 151,101 163,101"/><polygon points="185,112 179,124 191,124"/>
      <polygon points="170,66 164,78 176,78"/><polygon points="204,92 198,104 210,104"/><polygon points="148,132 142,144 154,144"/>
    </g>
    <circle cx="141" cy="166" r="5.5" fill="#2563eb"/>
    <polygon points="82,204 76,216 88,216" fill="#dc2626"/>
    <circle cx="82" cy="210" r="10" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="3,2"/>
    <circle cx="178" cy="99" r="5.5" fill="#2563eb"/>
    <circle cx="178" cy="99" r="10" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="3,2"/>
  </g>

  <line x1="812" y1="200" x2="842" y2="200" stroke="#475569" stroke-width="2.1" marker-end="url(#tf-ar)"/>
  <text x="827" y="189" text-anchor="middle" class="cap" fill="#b45309">Flip</text>

  <g transform="translate(850,70)">
    <rect class="plot" x="0" y="0" width="230" height="260" rx="8"/>
    <rect x="0" y="0" width="230" height="26" rx="8" fill="#b45309"/>
    <text x="115" y="18" text-anchor="middle" class="ttl">纠正后训练集</text>
    <path class="bd" d="M129,47 C 129,110 102,137 104,160 C 106,187 129,212 129,248"/>
    <g fill="#2563eb">
      <circle cx="52" cy="205" r="5.5"/><circle cx="70" cy="180" r="5.5"/><circle cx="96" cy="214" r="5.5"/>
      <circle cx="62" cy="238" r="5.5"/><circle cx="104" cy="196" r="5.5"/><circle cx="84" cy="168" r="5.5"/><circle cx="132" cy="230" r="5.5"/>
    </g>
    <g fill="#dc2626">
      <polygon points="157,89 151,101 163,101"/><polygon points="185,112 179,124 191,124"/>
      <polygon points="170,66 164,78 176,78"/><polygon points="204,92 198,104 210,104"/><polygon points="148,132 142,144 154,144"/>
    </g>
    <circle cx="82" cy="210" r="5.5" fill="#2563eb"/>
    <polygon points="178,93 172,105 184,105" fill="#dc2626"/>
    <polygon points="112,154 106,166 118,166" fill="#dc2626"/>
    <circle cx="112" cy="160" r="10" fill="none" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="3,2"/>
    <text x="132" y="148" class="note" fill="#b45309">误翻</text>
  </g>
  <text x="800" y="356" text-anchor="middle" class="cap">翻转保留全部样本；边界附近误判会引入二次噪声并使边界偏斜</text>
</svg>
